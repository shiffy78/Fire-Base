<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Dashboard</title>
    <link rel="stylesheet" href="index.css">
    <style>
        .product-form {background:#111;padding:20px;border-radius:14px;margin:12px auto;max-width:720px;box-shadow:0 10px 30px rgba(0,0,0,0.25);}
        .product-form-header {display:flex;flex-direction:column;align-items:flex-start;margin-bottom:16px;gap:8px;}
        .product-form-title {color:#fff;font-size:18px;font-weight:700;margin:0;}
        .product-form-grid {display:grid;grid-template-columns:1fr;gap:14px;}
        .product-form label {display:flex;flex-direction:column;color:#cbd5e1;font-size:14px;gap:8px;}
        .product-form input {width:100%;padding:14px 16px;border:1px solid #334155;border-radius:12px;background:#0f172a;color:#fff;outline:none;transition:border-color .2s ease;}
        .product-form input:focus {border-color:#8b5cf6;}
        .product-form-actions {display:flex;flex-direction:column;gap:12px;align-items:stretch;}
        .product-form button {width:100%;padding:12px 20px;border:none;border-radius:12px;font-weight:700;cursor:pointer;transition:opacity .2s ease;background:#8b5cf6;color:#fff;}
        .product-form button.secondary {background:#334155;}
        .product-form button:hover {opacity:.93;}
        .product-form .hint {color:#94a3b8;font-size:13px;}
    </style>
</head>

<body>

    <header>
        <div class="logo">
            <h2>SHIFFY MART ENTERPRISE</h2>
        </div>
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </nav>
        <div class="nav-btns">
            <button id="viewProfile" class="login">Profile</button>
            <button id="signOut" class="signup">Sign Out</button>
        </div>
    </header>

    <section class="products">
        <div class="section-title"><h2>Manage Products</h2></div>

        
        <div class="product-form">
            <div class="product-form-header">
                <h3 id="productFormTitle" class="product-form-title">Add new product</h3>
                <span class="hint">Fill the form and click Add Product. Use edit to update an existing item.</span>
            </div>
            <div class="product-form-grid">
                <label>
                    Product Name
                    <input id="prodName" type="text" placeholder="Enter product name">
                </label>
                <label>
                    Price (N)
                    <input id="prodPrice" type="number" min="0" placeholder="Enter product price">
                </label>
                <label>
                    Image URL
                    <input id="prodImg" type="text" placeholder="Enter product image URL">
                </label>
                <label>
                    Quantity
                    <input id="prodQuan" type="number" min="0" placeholder="Enter product quantity">
                </label>
            </div>
            <div class="product-form-actions">
                <button id="addProd">Add Product</button>
                <button id="cancelEdit" class="secondary hidden" type="button">Cancel</button>
            </div>
        </div>

        <div style="margin:12px 0;">
            <input id="searchInput" placeholder="Search products by name" style="width:20%;padding:10px;border-radius:8px;border:1px solid #ccc;">
        </div>

        <div class="product-grid" id="prods"></div>



   
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
        import { getDatabase, ref, set, onValue, remove } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCsTmvrLR0HVnbaGUaYZ_yLrfcNevfaZTs",
            authDomain: "may-project-16ddf.firebaseapp.com",
            databaseURL: "https://may-project-16ddf-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "may-project-16ddf",
            storageBucket: "may-project-16ddf.firebasestorage.app",
            messagingSenderId: "222286807201",
            appId: "1:222286807201:web:66cd70b45f3957fd36f0e0"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        const prodNameInput = document.getElementById('prodName');
        const prodPriceInput = document.getElementById('prodPrice');
        const prodImgInput = document.getElementById('prodImg');
        const prodQuanInput = document.getElementById('prodQuan');
        const prods = document.getElementById('prods');
        const addProdButton = document.getElementById('addProd');
        const cancelEditButton = document.getElementById('cancelEdit');
        const productFormTitle = document.getElementById('productFormTitle');
        const searchInput = document.getElementById('searchInput');

        let latestProducts = {};

        let editingKey = null;

        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = "/index.html";
                return;
            }

            document.getElementById("signOut").addEventListener("click", () => {
                signOut(auth).then(() => {
                    window.location.href = "/";
                }).catch((error) => {
                    console.error(error);
                });
            });
            // Ensure localStorage has a minimal user profile
            try {
                const localUser = { fullname: user.displayName || (user.email ? user.email.split('@')[0] : ''), email: user.email || '', picture: user.photoURL || 'https://via.placeholder.com/100', id: user.uid };
                localStorage.setItem('user', JSON.stringify(localUser));
            } catch (e) {
                console.warn('Could not set local user from auth state', e);
            }
        });

        function clearForm() {
            prodNameInput.value = '';
            prodPriceInput.value = '';
            prodImgInput.value = '';
            prodQuanInput.value = '';
            editingKey = null;
            addProdButton.textContent = 'Add Product';
            productFormTitle.textContent = 'Add new product';
            cancelEditButton.classList.add('hidden');
        }

        addProdButton.addEventListener('click', () => {
            const user = auth.currentUser;
            if (!user) {
                alert('Please sign in first.');
                return;
            }

                const name = prodNameInput.value.trim();
                const price = prodPriceInput.value.trim();
                const image = prodImgInput.value.trim();
                const quantity = prodQuanInput.value.trim();

                if (!name || !price || !quantity) {
                    alert('Please enter product name, price, and quantity.');
                    return;
                }

                const productKey = editingKey || Date.now().toString();
                const dbRef = ref(db, `/products/${productKey}`);
                const storedProd = {
                    prodName: name,
                    prodImg: image,
                    prodPrice: price,
                    prodQuan: quantity,
                    id: user.uid,
                    email: user.email
                };

                set(dbRef, storedProd).then(() => {
                    clearForm();
                }).catch((error) => {
                    console.error(error);
                    alert('Unable to save product.');
                });
            });

            cancelEditButton.addEventListener('click', () => {
                clearForm();
            });

        const vp = document.getElementById('viewProfile');
        if (vp) vp.addEventListener('click', () => { window.location.href = './profile.html'; });

        prods.addEventListener('click', (event) => {
            const button = event.target.closest('button');
            if (!button || !button.dataset.action) return;
            const key = button.dataset.key;
            if (!key) return;

            if (button.dataset.action === 'edit') {
                const item = JSON.parse(button.dataset.item);
                prodNameInput.value = item.prodName || '';
                prodPriceInput.value = item.prodPrice || '';
                prodImgInput.value = item.prodImg || '';
                prodQuanInput.value = item.prodQuan || '';
                editingKey = key;
                addProdButton.textContent = 'Update Product';
                productFormTitle.textContent = 'Update product';
                cancelEditButton.classList.remove('hidden');
                return;
            }

            if (button.dataset.action === 'delete') {
                if (!confirm('Delete this product?')) return;
                const dbRef = ref(db, `/products/${key}`);
                remove(dbRef).catch((error) => {
                    console.error(error);
                    alert('Unable to delete product.');
                });
            }
        });

        const productsRef = ref(db, `/products`);
        onValue(productsRef, (snapshot) => {
            latestProducts = snapshot.val() || {};
            renderProducts(searchInput ? searchInput.value : '');
        });

        function renderProducts(query) {
            const q = (query || '').toLowerCase().trim();
            const items = Object.entries(latestProducts || {});
            if (items.length === 0) {
                prods.innerHTML = '<p>No products yet.</p>';
                return;
            }

            const filtered = q ? items.filter(([k, item]) => {
                const name = (item.prodName || '').toLowerCase();
                const seller = (item.email || '').toLowerCase();
                return name.includes(q) || seller.includes(q);
            }) : items;

            if (filtered.length === 0) {
                prods.innerHTML = '<p>No matching products.</p>';
                return;
            }

            prods.innerHTML = '';
            filtered.forEach(([key, item]) => {
                const isOwner = auth.currentUser && auth.currentUser.email === item.email;
                prods.innerHTML += `
                    <div class="product-card">
                        <img src="${item.prodImg || ''}" alt="Product Image">
                        <h4>${item.prodName || ''}</h4>
                        <p>${item.prodPrice ? 'N ' + item.prodPrice : ''}</p>
                        <div>Quantity: ${item.prodQuan || ''}</div>
                        ${isOwner ? `
                            <div style="margin-top:8px;"><button data-action="edit" data-key="${key}" data-item='${JSON.stringify(item).replace(/'/g, "&#39;")}'>edit</button>
                            <button data-action="delete" data-key="${key}">delete</button></div>
                        ` : ''}
                    </div>
                `;
            });
        }

        if (searchInput) searchInput.addEventListener('input', (e) => renderProducts(e.target.value));
    </script>
</body>

</html>
